name: Update XMRIG Version

on:
  schedule:
    - cron: '0 3 * * *' # every day at 2am UTC
  workflow_dispatch:

jobs:
  update-xmrig-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check and update xmrig version
        id: version
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const { data } = await github.rest.repos.getLatestRelease({
              owner: 'xmrig',
              repo: 'xmrig',
            });
            const latest = data.tag_name;
            if (!latest) {
              core.setFailed('tag_name missing in latest release response');
              return;
            }

            const dockerfilePath = 'Dockerfile';
            const dockerfile = fs.readFileSync(dockerfilePath, 'utf8');
            const match = dockerfile.match(/^ARG XMRIG_VERSION=(\S+)/m);
            if (!match) {
              core.setFailed('ARG XMRIG_VERSION not found in Dockerfile');
              return;
            }
            const current = match[1];

            core.setOutput('latest', latest);
            core.setOutput('current', current);

            const summary = core.summary
              .addRaw(`XMRig latest=${latest}\n`)
              .addRaw(`XMRig current=${current}\n`);

            if (latest === current) {
              core.setOutput('updated', 'false');
              await summary.write();
              return;
            }

            const updated = dockerfile.replace(
              /^ARG XMRIG_VERSION=\S+/m,
              `ARG XMRIG_VERSION=${latest}`,
            );
            fs.writeFileSync(dockerfilePath, updated);
            core.setOutput('updated', 'true');
            await summary.addRaw('Update version\n').write();

      - name: Create Pull Request
        if: steps.version.outputs.updated == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_GITHUB }}
          commit-message: "chore: update XMRIG_VERSION to ${{ steps.version.outputs.latest }}"
          title: "Update XMRIG_VERSION to ${{ steps.version.outputs.latest }}"
          body: "Automated update of XMRIG_VERSION to ${{ steps.version.outputs.latest }}."
          branch: update/xmrig-version-${{ steps.version.outputs.latest }}
          assignees: ${{ github.repository_owner }}
          delete-branch: true
          labels: automerge,github-actions

      - name: Enable automerge for PR
        if: steps.cpr.outputs.pull-request-number
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
          token: ${{ secrets.PAT_GITHUB }}

